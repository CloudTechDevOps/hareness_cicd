pipeline:
  name: veeratest
  identifier: veeartest
  projectIdentifier: nit
  orgIdentifier: default
  properties:
    ci:
      codebase:
        connectorRef: vvv
        repoName: hareness_cicd
        build:
          type: branch
          spec:
            branch: main
  stages:
    - stage:
        name: Deploy_to_EC2
        identifier: Deploy_to_EC2
        type: Deployment
        spec:
          cloneCodebase: true
          deploymentType: Ssh
          service:
            serviceRef: python_app
          environment:
            environmentRef: veera-env
            infrastructureDefinitions:
              - identifier: infradefinition
          execution:
            steps:
              - step:
                  type: Command
                  name: Install Dependencies
                  identifier: Install
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Install
                        name: Install
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp
                                rm -rf hareness_cicd
                                git clone https://github.com/CloudTechDevOps/hareness_cicd.git
                                cd hareness_cicd
                                chmod +x scripts/install.sh
                                ./scripts/install.sh
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
              - step:
                  type: Command
                  name: Stop Application
                  identifier: StopApplication
                  timeout: 10m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Stop
                        name: Stop
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                chmod +x scripts/stop.sh
                                ./scripts/stop.sh
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
              - step:
                  type: Command
                  name: Start Application
                  identifier: Start
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Start
                        name: Start
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                chmod +x scripts/start.sh
                                ./scripts/start.sh
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
              - step:
                  type: Command
                  name: Health Check
                  identifier: HealthCheck
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Health
                        name: Health
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                chmod +x scripts/healthcheck.sh
                                ./scripts/healthcheck.sh
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
              - step:
                  type: Command
                  name: Save Successful Commit
                  identifier: SaveSuccessfulCommit
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: SaveCommit
                        name: SaveCommit
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                git rev-parse HEAD > /tmp/hareness_cicd_last_success_commit
                                echo "Saved successful commit: $(cat /tmp/hareness_cicd_last_success_commit)"
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
            rollbackSteps:
              - step:
                  type: Command
                  name: Stop Failed Deployment
                  identifier: RollbackStop
                  timeout: 10m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Stop
                        name: Stop
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                chmod +x scripts/stop.sh
                                ./scripts/stop.sh || true
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
              - step:
                  type: Command
                  name: Restore Last Successful Build
                  identifier: RollbackRestore
                  timeout: 10m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Restore
                        name: Restore
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                if [ -f /tmp/hareness_cicd_last_success_commit ]; then
                                  LAST_SUCCESS=$(cat /tmp/hareness_cicd_last_success_commit)
                                  echo "Rolling back to last successful commit: $LAST_SUCCESS"
                                  git fetch --all
                                  git checkout $LAST_SUCCESS
                                else
                                  echo "No last successful commit found, falling back to HEAD~1"
                                  git checkout HEAD~1
                                fi
                                chmod +x scripts/install.sh
                                ./scripts/install.sh
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
              - step:
                  type: Command
                  name: Start Previous Version
                  identifier: RollbackStart
                  timeout: 10m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Start
                        name: Start
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                chmod +x scripts/start.sh
                                ./scripts/start.sh
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
              - step:
                  type: Command
                  name: Rollback Health Check
                  identifier: RollbackHealthCheck
                  timeout: 10m
                  spec:
                    onDelegate: false
                    shell: Bash
                    commandUnits:
                      - identifier: Health
                        name: Health
                        type: Script
                        spec:
                          shell: Bash
                          source:
                            type: Inline
                            spec:
                              script: |
                                cd /tmp/hareness_cicd
                                chmod +x scripts/healthcheck.sh
                                ./scripts/healthcheck.sh
                  strategy:
                    repeat:
                      items: <+stage.output.hosts>
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
